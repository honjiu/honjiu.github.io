<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深圳市2026年中考英语听说考试成绩查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                    },
                    backgroundImage: {
                        'gradient-rickroll': 'linear-gradient(90deg, #FF0080, #7928CA, #0070F3, #00DFD8)',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-oval {
                border-radius: 9999px;
            }
            .progress-oval {
                border-radius: 9999px;
            }
            .input-focus {
                @apply focus:ring-2 focus:ring-primary/50 focus:border-primary focus:outline-none;
            }
            .text-gradient {
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
            }
            .animate-fade-in {
                animation: fadeIn 1s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-50 to-white min-h-screen flex flex-col items-center justify-center p-4 font-sans">
    <!-- 主查询界面 -->
    <div id="query-container" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center transition-all duration-500">
        <div class="mb-8">
            <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <h1 class="text-[clamp(1.5rem,4vw,2rem)] font-bold text-gray-800 mb-2">深圳市2026年中考英语听说考试</h1>
            <h2 class="text-[clamp(1.2rem,3vw,1.5rem)] font-bold text-primary mb-6">成绩查询</h2>
            <p class="text-gray-500 text-sm mb-6">请输入准考证号查询考试成绩</p>
        </div>
        
        <div class="mb-6">
            <div class="relative">
                <input 
                    type="text" 
                    id="exam-number" 
                    placeholder="请输入13位准考证号" 
                    maxlength="13"
                    class="w-full px-5 py-4 border border-gray-300 rounded-xl text-lg text-center input-focus transition-all duration-300"
                >
                <div class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0h10a2 2 0 100-4 2 2 0 000 4z" />
                    </svg>
                </div>
            </div>
            <p id="error-message" class="text-red-500 text-sm mt-2 hidden">请输入有效的13位准考证号</p>
        </div>
        
        <button id="query-btn" class="w-full py-4 px-8 bg-primary hover:bg-primary/90 text-white font-medium text-lg btn-oval transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-lg hover:shadow-primary/20 hover:shadow-xl">
            立即查询
        </button>
        
        <div class="mt-8 text-xs text-gray-400">
            <p>开启查询通道时间：2026-05-17 12:00<br>我们不会记录您的任何个人信息</p>
            <p class="mt-2">© ri3bz6x.cn</p>
        </div>
    </div>

    <!-- 进度条界面 -->
    <div id="progress-container" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center hidden transition-all duration-500">
        <div class="mb-8">
            <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-6">正在连接至服务器...</h2>
            <p class="text-gray-500 text-sm mb-8">准考证号：<span id="display-exam-number" class="font-medium text-primary"></span></p>
            <p id="status-text" class="text-gray-500 text-sm mb-4">请稍候，正在向服务器发送请求...</p>
            
            <div class="w-full h-3 bg-gray-200 progress-oval overflow-hidden mb-4">
                <div id="progress-bar" class="h-full bg-primary progress-oval w-0 transition-all duration-100"></div>
            </div>
            <p id="progress-text" class="text-xs text-gray-500">0%</p>
        </div>
    </div>

    <!-- 查询结果界面 -->
    <div id="result-container" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 text-center hidden transition-all duration-500">
        <div class="py-12">
            <p id="rickroll-text" class="text-2xl font-bold bg-gradient-rickroll text-gradient animate-fade-in">请下载国家反诈中心APP</p>
        </div>
        
        <button id="back-btn" class="w-full py-4 px-8 bg-primary hover:bg-primary/90 text-white font-medium text-lg btn-oval transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-lg hover:shadow-primary/20 hover:shadow-xl">
            返回
        </button>
    </div>

    <script>
        const queryContainer = document.getElementById('query-container');
        const progressContainer = document.getElementById('progress-container');
        const resultContainer = document.getElementById('result-container');
        const queryBtn = document.getElementById('query-btn');
        const backBtn = document.getElementById('back-btn');
        const examNumberInput = document.getElementById('exam-number');
        const errorMessage = document.getElementById('error-message');
        const displayExamNumber = document.getElementById('display-exam-number');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const statusText = document.getElementById('status-text');

        queryBtn.addEventListener('click', startQuery);
        backBtn.addEventListener('click', goBack);
        
        // 允许按回车键提交
        examNumberInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startQuery();
            }
        });

        function startQuery() {
            const examNumber = examNumberInput.value.trim();
            
            // 验证：检查是否为13位数字
            if (!/^\d{13}$/.test(examNumber)) {
                errorMessage.classList.remove('hidden');
                examNumberInput.classList.add('border-red-500');
                
                // 3秒后隐藏错误信息
                setTimeout(() => {
                    errorMessage.classList.add('hidden');
                    examNumberInput.classList.remove('border-red-500');
                }, 3000);
                
                return;
            }
            
            // 显示用户输入的考号
            displayExamNumber.textContent = examNumber;
            
            // 隐藏查询界面，显示进度条界面
            queryContainer.classList.add('hidden');
            progressContainer.classList.remove('hidden');

            // 模拟真实的进度条加载，包含停顿和状态变化
            let progress = 0;
            const stages = [
                { progress: 25, text: "正在验证准考证号...", delay: 300 },
                { progress: 45, text: "正在查询考生信息...", delay: 500 },
                { progress: 65, text: "正在获取考试成绩...", delay: 700 },
                { progress: 85, text: "正在生成查询结果...", delay: 400 },
                { progress: 100, text: "查询完成！", delay: 0 }
            ];
            
            let currentStage = 0;
            
            function updateProgress() {
                if (currentStage >= stages.length) {
                    setTimeout(showResult, 500);
                    return;
                }
                
                const stage = stages[currentStage];
                
                // 快速增长到当前阶段的进度
                const interval = setInterval(() => {
                    if (progress < stage.progress) {
                        progress += 1;
                        progressBar.style.width = `${progress}%`;
                        progressText.textContent = `${progress}%`;
                    } else {
                        clearInterval(interval);
                        statusText.textContent = stage.text;
                        
                        // 停顿指定时间后进入下一阶段
                        setTimeout(() => {
                            currentStage++;
                            updateProgress();
                        }, stage.delay);
                    }
                }, 30);
            }
            
            updateProgress();
        }

        function showResult() {
            // 隐藏进度条界面，显示结果界面
            progressContainer.classList.add('hidden');
            resultContainer.classList.remove('hidden');
        }

        function goBack() {
            // 重置所有状态
            resultContainer.classList.add('hidden');
            queryContainer.classList.remove('hidden');
            examNumberInput.value = '';
            progressBar.style.width = '0%';
            progressText.textContent = '0%';
            statusText.textContent = '请稍候，正在向服务器发送请求...';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>天气</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1976D2' },
          animation: {
            'slide-up': 'slideUp 0.3s ease-out forwards',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
          },
          keyframes: {
            slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .hour-item-width { width: 50px; }
    }
  </style>
</head>
<body class="font-sans bg-gray-100">
  <div class="relative max-w-[430px] mx-auto min-h-screen overflow-hidden bg-gradient-to-b from-[#1565C0] to-[#0D47A1] text-white">
    <main class="pt-8 px-4 pb-6 h-screen overflow-y-auto scrollbar-hide">
      <!-- 头部区域 -->

        <h1 id="cityName" class="text-[42px] font-bold mb-1">北京</h1>
        <p id="dateText" class="text-white/80 text-sm mb-1">--</p>
        <p id="updateTip" class="text-white/70 text-xs">加载中...</p>
        <button id="citySelectBtn" class="absolute top-0 right-0 w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 active:bg-white/20 transition-all">
          <span class="material-icons">location_on</span>
        </button>
      </div>
      <!-- 实时温度区域 -->
      <div class="text-center mb-8">
        <div id="currentTemp" class="text-[96px] font-bold leading-none mb-2">--°</div>
        <div class="flex items-center justify-center gap-4 mb-6">
          <div id="weatherDesc" class="text-2xl font-medium">--</div>
          <div id="todayTempRange" class="text-xl font-medium text-white/80">--° / --°</div>
        </div>
        <div class="flex items-center justify-center gap-2 text-sm text-white/80">
          <span id="feelsLike">体感 --°</span>
          <span>·</span>
          <span id="windInfo">--</span>
          <span>·</span>
          <span id="humidity">湿度 --%</span>
        </div>
      </div>
      <!-- AQI卡片 -->
      <div class="mb-6">
        <div id="aqiCard" class="w-full rounded-full py-3 text-center font-semibold text-white shadow-md">
          AQI -- · --
        </div>
      </div>
      <!-- 24小时预报板块 -->
      <div class="bg-white/10 backdrop-blur-md rounded-[28px] p-6 mb-4 shadow-md">
        <h2 class="text-lg font-semibold mb-4">24小时预报</h2>
        <!-- 横向滚动核心容器 -->
        <div class="w-full overflow-x-auto scrollbar-hide touch-pan-x" id="hourlyScrollContainer">
          <div class="relative min-w-[1200px] h-[180px]" id="hourlyContainer">
            <!-- 温度折线SVG层（底层） -->
            <svg class="absolute top-0 left-0 w-full h-[60px]" id="tempLineSvg">
              <path id="tempLinePath" fill="none" stroke="#FFCE00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="" />
            </svg>
            <!-- 24小时项列表（上层） -->
            <div class="absolute top-0 left-0 w-full h-full flex justify-between" id="hourlyList"></div>
          </div>
        </div>
      </div>
      <!-- 今日概览 -->
      <div class="bg-white/10 backdrop-blur-md rounded-[28px] p-6 mb-4 shadow-md">
        <h2 class="text-lg font-semibold mb-6">今日概览</h2>
        <div class="grid grid-cols-2 gap-y-8">
          <div>
            <p class="text-white/70 text-sm mb-1">日出</p>
            <p id="sunrise" class="text-xl font-bold">--:--</p>
          </div>
          <div>
            <p class="text-white/70 text-sm mb-1">日落</p>
            <p id="sunset" class="text-xl font-bold">--:--</p>
          </div>
          <div>
            <p class="text-white/70 text-sm mb-1">气压</p>
            <p id="pressure" class="text-xl font-bold">-- hPa</p>
          </div>
          <div>
            <p class="text-white/70 text-sm mb-1">紫外线</p>
            <p id="uvIndex" class="text-xl font-bold">--级</p>
          </div>
        </div>
      </div>
      <!-- 未来7天预报 -->
      <div class="bg-white/10 backdrop-blur-md rounded-[28px] p-6 mb-6 shadow-md">
        <h2 class="text-lg font-semibold mb-4">未来7天</h2>
        <div id="forecastContainer" class="space-y-4">
          <div class="text-center text-white/60">加载中...</div>
        </div>
      </div>
      <!-- 底部版权 -->
      <div class="text-center text-white/50 text-xs pb-8 space-y-1">
        <p>数据来源：Open-Meteo</p>
        <p>© 2026 弘九honjiu All rights reserved.</p>
      </div>
    </main>
    <!-- 城市选择抽屉 -->
    <div id="citySheet" class="fixed inset-0 bg-black/50 z-50 hidden items-end justify-center animate-fade-in">
      <div class="bg-white rounded-t-[28px] w-full max-w-[430px] p-6 pb-10 animate-slide-up">
        <div class="w-12 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
        <h2 class="text-center text-lg font-semibold text-gray-800 mb-5">请选择所在城市</h2>

          <label class="text-sm text-gray-500 block mb-1">选择城市</label>

  </div>

      { name: '湖南', cities: ['长沙','株洲','湘潭','衡阳','邵阳','岳阳','常德','张家界','益阳','郴州','永州','怀化','娄底','湘西'] },

      { name: '海南', cities: ['海口','三亚','三沙','儋州'] },{ name: '重庆', cities: ['重庆'] },
      { name: '四川', cities: ['成都','自贡','攀枝花','泸州','德阳','绵阳','广元','遂宁','内江','乐山','南充','眉山','宜宾','广安','达州','雅安','巴中','资阳','阿坝','甘孜','凉山'] },
      { name: '贵州', cities: ['贵阳','六盘水','遵义','安顺','毕节','铜仁','黔西南','黔东南','黔南'] },
      { name: '云南', cities: ['昆明','曲靖','玉溪','保山','昭通','丽江','普洱','临沧','楚雄','红河','文山','西双版纳','大理','德宏','怒江','迪庆'] },
      { name: '西藏', cities: ['拉萨','日喀则','昌都','林芝','山南','那曲','阿里'] },
      { name: '陕西', cities: ['西安','铜川','宝鸡','咸阳','渭南','延安','汉中','榆林','安康','商洛'] },
      { name: '甘肃', cities: ['兰州','嘉峪关','金昌','白银','天水','武威','张掖','平凉','酒泉','庆阳','定西','陇南','临夏','甘南'] },
      { name: '青海', cities: ['西宁','海东','海北','黄南','海南','果洛','玉树','海西'] },
      { name: '宁夏', cities: ['银川','石嘴山','吴忠','固原','中卫'] },
      { name: '新疆', cities: ['乌鲁木齐','克拉玛依','吐鲁番','哈密','昌吉','博尔塔拉','巴音郭楞','阿克苏','克孜勒苏','喀什','和田','伊犁','塔城','阿勒泰'] }
    ];
    // 天气代码映射（适配参考图图标）
    const weatherCodeMap = {
      0: { text: '晴', icon: 'wb_sunny' },1: { text: '多云', icon: 'wb_cloudy' },2: { text: '阴', icon: 'cloud' },3: { text: '阴', icon: 'cloud' },
      45: { text: '雾', icon: 'foggy' },48: { text: '雾凇', icon: 'ac_unit' },51: { text: '毛毛雨', icon: 'grain' },53: { text: '小雨', icon: 'umbrella' },55: { text: '中雨', icon: 'umbrella' },
      56: { text: '冻雨', icon: 'ac_unit' },57: { text: '冻雨', icon: 'ac_unit' },61: { text: '小雨', icon: 'umbrella' },63: { text: '中雨', icon: 'umbrella' },65: { text: '大雨', icon: 'umbrella' },
      66: { text: '冻雨', icon: 'ac_unit' },67: { text: '暴雨', icon: 'water_drop' },71: { text: '小雪', icon: 'ac_unit' },73: { text: '中雪', icon: 'ac_unit' },75: { text: '大雪', icon: 'ac_unit' },
      77: { text: '雪粒', icon: 'grain' },80: { text: '阵雨', icon: 'umbrella' },81: { text: '阵雨', icon: 'umbrella' },82: { text: '强阵雨', icon: 'thunderstorm' },85: { text: '阵雪', icon: 'ac_unit' },
      86: { text: '强阵雪', icon: 'ac_unit' },95: { text: '雷阵雨', icon: 'thunderstorm' },96: { text: '雷暴冰雹', icon: 'thunderstorm' },99: { text: '强雷暴', icon: 'thunderstorm' }
    };
    // 工具函数
    function getWindDirection(degree) {
      const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
      return directions[Math.round(degree / 45) % 8];
    }
    function getWindScale(speed) {
      if (speed < 1) return 0;
      if (speed < 6) return 1;
      if (speed < 12) return 2;
      if (speed < 20) return 3;
      if (speed < 29) return 4;
      if (speed < 39) return 5;
      if (speed < 50) return 6;
      if (speed < 62) return 7;
      if (speed < 75) return 8;
      if (speed < 89) return 9;
      if (speed < 103) return 10;
      if (speed < 118) return 11;
      return 12;
    }
    function getAqiInfo(aqi) {
      if (aqi <= 50) return { level: '优', className: 'text-green-300' };
      if (aqi <= 100) return { level: '良', className: 'text-blue-300' };
      if (aqi <= 150) return { level: '轻度污染', className: 'text-orange-300' };
      if (aqi <= 200) return { level: '中度污染', className: 'text-orange-500' };
      if (aqi <= 300) return { level: '重度污染', className: 'text-red-400' };
      return { level: '严重污染', className: 'text-purple-400' };
    }
    const weekMap = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    // DOM元素
    const citySheet = document.getElementById('citySheet');
    const citySelectBtn = document.getElementById('citySelectBtn');
    const closeSheetBtn = document.getElementById('closeSheetBtn');
    const confirmCityBtn = document.getElementById('confirmCityBtn');
    const provinceSelect = document.getElementById('provinceSelect');
    const citySelect = document.getElementById('citySelect');
    const errorToast = document.getElementById('errorToast');
    const hourlyScrollContainer = document.getElementById('hourlyScrollContainer');
    const hourlyList = document.getElementById('hourlyList');
    const tempLinePath = document.getElementById('tempLinePath');
    const STORAGE_KEY = 'savedWeatherCity';
    // 交互逻辑
    citySelectBtn.onclick = () => {
      citySheet.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };
    const closeCitySheet = () => {
      citySheet.style.display = 'none';
      document.body.style.overflow = 'auto';
    };
    closeSheetBtn.onclick = closeCitySheet;
    citySheet.onclick = (e) => e.target === citySheet && closeCitySheet();
    // 初始化省份下拉
    provinceCityData.forEach(province => {
      const option = document.createElement('option');
      option.value = province.name;
      option.textContent = province.name;
      provinceSelect.appendChild(option);
    });
    // 省份联动城市
    provinceSelect.onchange = () => {
      const selectedProvince = provinceCityData.find(p => p.name === provinceSelect.value);
      citySelect.innerHTML = '';
      if (selectedProvince) {
        selectedProvince.cities.forEach(city => {
          const option = document.createElement('option');
          option.value = city;
          option.textContent = city;
          citySelect.appendChild(option);
        });
      } else {
        citySelect.innerHTML = '<option value="">请先选择省份</option>';
      }
    };
    // 错误提示
    const showError = (text) => {
      errorToast.textContent = text;
      errorToast.style.display = 'block';
      setTimeout(() => errorToast.style.display = 'none', 3000);
    };
    // 回显城市选择
    function initCitySelector(cityName) {
      for (const province of provinceCityData) {
        const foundCity = province.cities.find(c => c === cityName);
        if (foundCity) {
          provinceSelect.value = province.name;
          provinceSelect.dispatchEvent(new Event('change'));
          setTimeout(() => citySelect.value = foundCity, 0);
          break;
        }
      }
    }
    // 核心API逻辑
    async function getCityLocation(cityName) {
      const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&language=zh&count=1`);
      const data = await res.json();
      if (!data.results || data.results.length === 0) throw new Error('未找到该城市');
      return { lat: data.results[0].latitude, lon: data.results[0].longitude, name: data.results[0].name };
    }
    // 扩展API请求，获取24小时逐小时完整数据（温度、天气、风力、AQI）
    async function fetchWeatherData(lat, lon) {
      const [weatherRes, airRes] = await Promise.all([
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,surface_pressure,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,uv_index_max&forecast_hours=24&timezone=Asia/Shanghai`),
        fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=european_aqi&timezone=Asia/Shanghai`)
      ]);
      return { weather: await weatherRes.json(), air: await airRes.json() };
    }
    // 核心：渲染24小时预报板块（温度跟随折线移动优化版）
    function render24HourForecast(hourlyData, aqiData) {
      const currentHour = new Date().getHours();
      const totalHours = 24;
      const itemWidth = 50; // 每个小时项的宽度，与CSS保持一致
      const svgWidth = totalHours * itemWidth;
      const svgHeight = 60;
      const padding = 10; // 折线上下边距
      const availableHeight = svgHeight - padding * 2;
      
      // 1. 处理温度数据
      const tempList = hourlyData.temperature_2m.map(t => Math.round(t));
      const maxTemp = Math.max(...tempList);
      const minTemp = Math.min(...tempList);
      const tempRange = maxTemp - minTemp || 1; // 避免除以0
      
      // 2. 计算每个温度点的坐标，生成平滑折线路径
      let pathD = '';
      const points = [];
      for (let i = 0; i < totalHours; i++) {
        const x = i * itemWidth + itemWidth / 2; // 每个项的中心x坐标
        const tempPercent = (tempList[i] - minTemp) / tempRange;
        const y = svgHeight - padding - tempPercent * availableHeight; // 温度越高，y值越小（越靠上）
        points.push({ x, y });
        if (i === 0) {
          pathD += `M ${x} ${y}`;
        } else {
          // 平滑贝塞尔曲线，保证折线流畅
          const prevPoint = points[i - 1];
          const cpx1 = (prevPoint.x + x) / 2;
          const cpy1 = prevPoint.y;
          const cpx2 = (prevPoint.x + x) / 2;
          const cpy2 = y;
          pathD += ` C ${cpx1} ${cpy1}, ${cpx2} ${cpy2}, ${x} ${y}`;
        }
      }
      tempLinePath.setAttribute('d', pathD);
      tempLinePath.setAttribute('width', svgWidth);
      
      // 3. 渲染24个小时项（核心优化：温度跟随折线定位）
      hourlyList.innerHTML = '';
      let currentIndex = 0;
      for (let i = 0; i < totalHours; i++) {
        const time = new Date(hourlyData.time[i] + '+08:00');
        const hour = time.getHours();
        const isCurrent = hour === currentHour;
        if (isCurrent) currentIndex = i;
        
        const temp = tempList[i];
        const weatherInfo = weatherCodeMap[hourlyData.weather_code[i]] || weatherCodeMap[3];
        const windScale = getWindScale(hourlyData.wind_speed_10m[i]);
        const aqi = Math.round(aqiData.european_aqi[i] || 0);
        const aqiInfo = getAqiInfo(aqi);
        const timeText = isCurrent ? '现在' : `${hour.toString().padStart(2, '0')}:00`;
        
        // 生成每个小时项的DOM，核心修改温度定位与圆点对齐
        const hourItem = document.createElement('div');
        // 新增relative，作为温度绝对定位的参考容器
        hourItem.className = `flex flex-col items-center justify-between h-full hour-item-width relative`;
        hourItem.innerHTML = `
          <!-- 温度文本：跟随折线点位置，始终在点上方（可调整-20px修改与折线的间距） -->
          <span class="text-sm font-medium absolute left-1/2 -translate-x-1/2 z-20" style="top: ${points[i].y - 20}px">${temp}°</span>
          
          <!-- 折线点容器：和SVG高度一致，用于精准对齐折线点 -->
          <div class="relative w-full h-[60px]">
            ${isCurrent ? `
              <!-- 当前时间高亮圆点：与SVG折线点完全对齐 -->
              <div class="absolute w-3 h-3 bg-white border-2 border-[#FFCE00] rounded-full z-10" style="top: ${points[i].y}px; left: 50%; transform: translate(-50%, -50%);"></div>
              <!-- 垂直辅助线：从圆点下方延伸到底部，位置更精准 -->
              <div class="absolute w-px border-dashed border-white/60 border-l z-0" style="top: ${points[i].y + 2}px; left: 50%; bottom: 0;"></div>
            ` : ''}
          </div>
          
          <!-- 天气图标 -->
          <span class="material-icons text-white mb-1">${weatherInfo.icon}</span>
          
          <!-- 风力等级 -->
          <span class="text-xs text-white/80 mb-1">${windScale}级</span>
          
          <!-- 空气质量 -->
          <span class="text-xs font-medium ${aqiInfo.className} mb-1">${aqiInfo.level}</span>
          
          <!-- 底部时间 -->
          <span class="text-xs text-white/80">${timeText}</span>
        `;
        hourlyList.appendChild(hourItem);
      }
      
      // 4. 自动滚动到当前时间的位置
      setTimeout(() => {
        const scrollLeft = currentIndex * itemWidth - hourlyScrollContainer.clientWidth / 2 + itemWidth / 2;
        hourlyScrollContainer.scrollTo({ left: scrollLeft, behavior: 'smooth' });
      }, 100);
    }
    // 渲染天气数据
    function renderWeather(cityName, data) {
      const { weather, air } = data;
      const current = weather.current;
      const daily = weather.daily;
      const hourly = weather.hourly;
      const hourlyAqi = air.hourly;
      // 基础信息
      document.getElementById('cityName').textContent = cityName;
      document.getElementById('dateText').textContent = new Date().toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }).replace('/', '-');
      document.getElementById('updateTip').textContent = `更新于 ${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}`;
      // 实时天气
      const weatherInfo = weatherCodeMap[current.weather_code] || weatherCodeMap[3];
      document.getElementById('currentTemp').textContent = `${Math.round(current.temperature_2m)}°`;
      document.getElementById('weatherDesc').textContent = weatherInfo.text;
      document.getElementById('todayTempRange').textContent = `${Math.round(daily.temperature_2m_min[0])}° / ${Math.round(daily.temperature_2m_max[0])}°`;
      // 辅助信息
      document.getElementById('feelsLike').textContent = `体感 ${Math.round(current.apparent_temperature)}°`;
      document.getElementById('humidity').textContent = `湿度 ${current.relative_humidity_2m}%`;
      document.getElementById('pressure').textContent = `${Math.round(current.surface_pressure)} hPa`;
      document.getElementById('windInfo').textContent = `${getWindDirection(current.wind_direction_10m)}风 ${getWindScale(current.wind_speed_10m)}级`;
      // 日出日落紫外线
      const sunrise = daily.sunrise[0];
      const sunset = daily.sunset[0];
      document.getElementById('sunrise').textContent = sunrise.split('T')[1];
      document.getElementById('sunset').textContent = sunset.split('T')[1];
      document.getElementById('uvIndex').textContent = `${Math.round(daily.uv_index_max[0])}级`;
      // AQI
      const aqi = Math.round(air.hourly.european_aqi[0] || 0);
      const aqiInfo = getAqiInfo(aqi);
      const aqiCard = document.getElementById('aqiCard');
      aqiCard.className = `w-full rounded-full py-3 text-center font-semibold text-white shadow-md ${aqiInfo.className.replace('text-', 'bg-')}`;
      aqiCard.textContent = `AQI ${aqi} · ${aqiInfo.level}`;
      // 渲染24小时预报板块
      render24HourForecast(hourly, hourlyAqi);
      // 7天预报
      const forecastContainer = document.getElementById('forecastContainer');
      forecastContainer.innerHTML = '';
      daily.time.forEach((date, index) => {
        const dayWeather = weatherCodeMap[daily.weather_code[index]] || weatherCodeMap[3];
        const weekText = index === 0 ? '今天' : weekMap[new Date(date).getDay()];
        const maxTemp = Math.round(daily.temperature_2m_max[index]);
        const minTemp = Math.round(daily.temperature_2m_min[index]);
        const dayItem = document.createElement('div');
        dayItem.className = 'flex items-center justify-between py-1';
        dayItem.innerHTML = `
          <span class="w-16 font-medium">${weekText}</span>
          <div class="flex items-center gap-2 flex-1">
            <span class="material-icons">${dayWeather.icon}</span>
            <span class="text-white/80">${dayWeather.text}</span>
          </div>
          <span class="font-medium">${minTemp}° / ${maxTemp}°</span>
        `;
        forecastContainer.appendChild(dayItem);
      });
    }
    // 加载天气主函数
    async function loadWeather(cityName) {
      try {
        document.getElementById('updateTip').textContent = '加载中...';
        const location = await getCityLocation(cityName);
        const weatherData = await fetchWeatherData(location.lat, location.lon);
        renderWeather(location.name, weatherData);
      } catch (error) {
        console.error(error);
        showError('加载失败，请检查网络或更换城市重试');
        document.getElementById('updateTip').textContent = '加载失败';
      }
    }
    // 切换城市
    confirmCityBtn.onclick = () => {
      const selectedCity = citySelect.value;
      if (!selectedCity) return showError('请选择城市');
      localStorage.setItem(STORAGE_KEY, selectedCity);
      closeCitySheet();
      loadWeather(selectedCity);
    };
    // 页面初始化
    window.onload = () => {
      const savedCity = localStorage.getItem(STORAGE_KEY);
      if (savedCity) {
        loadWeather(savedCity);
        initCitySelector(savedCity);
      } else {
        loadWeather('北京');
        citySheet.style.display = 'flex';
      }
    };
  </script>
</body>
</html>

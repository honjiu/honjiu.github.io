<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>天气</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#1976D2' },
          animation: {
            'slide-up': 'slideUp 0.3s ease-out forwards',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
          },
          keyframes: {
            slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .hour-item-width { width: 50px; }
    }
  </style>
</head>
<body class="font-sans bg-gray-100">
  <div class="relative max-w-[430px] mx-auto min-h-screen overflow-hidden bg-gradient-to-b from-[#1565C0] to-[#0D47A1] text-white">

        <p id="dateText" class="text-white/80 text-sm mb-1">--</p>

          <span class="material-icons">location_on</span>
        </button>
      </div>
      <div class="text-center mb-8">
        <div id="currentTemp" class="text-[96px] font-bold leading-none mb-2">--°</div>
        <div class="flex items-center justify-center gap-4 mb-6">

          <div id="todayTempRange" class="text-xl font-medium text-white/80">--° / --°</div>
        </div>
        <div class="flex items-center justify-center gap-2 text-sm text-white/80">

          <span>·</span>
          <span id="windInfo">--</span>
          <span>·</span>
          <span id="humidity">湿度 --%</span>
        </div>
      </div>
      <div class="mb-6">
        <div id="aqiCard" class="w-full rounded-full py-3 text-center font-semibold text-white shadow-md">
          AQI -- · --
        </div>
      </div>
      <div class="bg-white/10 backdrop-blur-md rounded-[28px] p-6 pt-10 pb-8 mb-4 shadow-md">
        <h2 class="text-lg font-semibold mb-8">24小时预报</h2>
        <div class="w-full overflow-x-auto scrollbar-hide touch-pan-x" id="hourlyScrollContainer">
          <div class="relative min-w-[1200px] h-[220px]" id="hourlyContainer">
            <svg class="absolute top-[25px] left-0 w-full h-[60px]" id="tempLineSvg">
              <path id="tempLinePath" fill="none" stroke="#FFCE00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="" />
            </svg>
            <div class="absolute top-0 left-0 w-full h-full flex justify-between" id="hourlyList"></div>
          </div>
        </div>
      </div>
      <div class="bg-white/10 backdrop-blur-md rounded-[28px] p-6 mb-4 shadow-md">
        <h2 class="text-lg font-semibold mb-6">今日概览</h2>
        <div class="grid grid-cols-2 gap-y-8">
          <div><p class="text-white/70 text-sm mb-1">日出</p><p id="sunrise" class="text-xl font-bold">--:--</p></div>
          <div><p class="text-white/70 text-sm mb-1">日落</p><p id="sunset" class="text-xl font-bold">--:--</p></div>
          <div><p class="text-white/70 text-sm mb-1">气压</p><p id="pressure" class="text-xl font-bold">-- hPa</p></div>
          <div><p class="text-white/70 text-sm mb-1">紫外线</p><p id="uvIndex" class="text-xl font-bold">--级</p></div>
        </div>
      </div>
      <div class="bg-white/10 backdrop-blur-md rounded-[28px] p-6 mb-6 shadow-md">
        <h2 class="text-lg font-semibold mb-4">未来7天</h2>
        <div id="forecastContainer" class="space-y-4"><div class="text-center text-white/60">加载中...</div></div>
      </div>
      <div class="text-center text-white/50 text-xs pb-8 space-y-1">
        <p>数据来源：Open-Meteo</p>
        <p>Copyright © 2026 冬雪社. All rights reserved.</p>
      </div>
    </main>
